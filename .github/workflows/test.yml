name: Automated Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 30

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 30

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Coverage Report
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/
          retention-days: 30

  instrumented-tests:
    name: Instrumented Tests (ReDroid)
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start ReDroid Emulator
        run: |
          docker run -d --privileged \
            -p 5555:5555 \
            --name redroid \
            redroid/redroid:14.0.0-latest
          
          # Wait for emulator to start
          sleep 60
          
          # Connect ADB
          adb connect localhost:5555
          adb devices

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/

      - name: Install APK on Emulator
        run: |
          adb -s localhost:5555 install -r app/build/outputs/apk/debug/app-debug.apk

      - name: Run Instrumented Tests
        run: |
          ./gradlew connectedAndroidTest --no-daemon -Pandroid.testInstrumentationRunnerArguments.class=com.artier.ide.ArtierIDEInstrumentedTest

      - name: Capture Screenshot
        if: always()
        run: |
          adb -s localhost:5555 shell screencap -p /sdcard/screenshot.png
          adb -s localhost:5555 pull /sdcard/screenshot.png screenshot.png

      - name: Upload Screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshot
          path: screenshot.png
          retention-days: 30

      - name: Stop ReDroid Emulator
        if: always()
        run: |
          docker stop redroid
          docker rm redroid

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, build, lint, coverage, instrumented-tests]
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Summary Report
        run: |
          echo "# Artier IDE - Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Instrumented Tests | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Debug APK: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Release APK: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Test Reports: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage Report: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Emulator Screenshot: Available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests completed successfully! 🎉" >> $GITHUB_STEP_SUMMARY
